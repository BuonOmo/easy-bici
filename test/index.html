<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>easy-bici — tests</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			body {
				font-family:
					ui-monospace, 'Cascadia Code', 'Source Code Pro', monospace;
				max-width: 720px;
				margin: 2rem auto;
				padding: 0 1.25rem;
				background: #0f1117;
				color: #c9d1d9;
			}
			h1 {
				font-size: 1rem;
				color: #8b949e;
				margin-bottom: 1.5rem;
				letter-spacing: 0.05em;
			}
			h1 span {
				color: #e6edf3;
			}
			.suite {
				margin-bottom: 0.5rem;
			}
			.test {
				display: flex;
				flex-direction: column;
				padding: 0.4rem 0.7rem;
				margin: 0.2rem 0;
				border-radius: 4px;
				border-left: 3px solid transparent;
				font-size: 0.9rem;
			}
			.test.pending {
				border-color: #d29922;
				color: #d29922;
			}
			.test.pass {
				border-color: #3fb950;
				color: #3fb950;
			}
			.test.fail {
				border-color: #f85149;
				color: #f85149;
			}
			.test .detail {
				font-size: 0.8rem;
				margin-top: 0.25rem;
				opacity: 0.75;
				white-space: pre-wrap;
			}
			#summary {
				margin-top: 1.5rem;
				padding: 0.5rem 0.75rem;
				border-radius: 4px;
				font-size: 0.9rem;
				font-weight: bold;
			}
			#summary.pending {
				background: #21262d;
				color: #8b949e;
			}
			#summary.all-pass {
				background: #1f3a25;
				color: #3fb950;
			}
			#summary.has-fail {
				background: #3d1c1c;
				color: #f85149;
			}
		</style>
	</head>
	<body>
		<h1>easy-bici / <span>test suite</span></h1>
		<div id="output"></div>
		<div id="summary" class="pending">⏳ running…</div>

		<script type="module">
			import {
				loadGTFS,
				materializeConnections,
			} from '../src/gtfs-loader.js'
			import { findTestDate, runTests } from './journey-tests.js'

			// ── DOM harness ────────────────────────────────────────────────────────

			const results = []
			const outputEl = document.getElementById('output')
			const summaryEl = document.getElementById('summary')

			function assert(condition, message) {
				if (!condition) throw new Error(message)
			}

			async function test(name, fn) {
				const div = document.createElement('div')
				div.className = 'test pending'
				div.textContent = `⏳  ${name}`
				outputEl.appendChild(div)
				try {
					await fn()
					div.className = 'test pass'
					div.textContent = `✅  ${name}`
					results.push({ name, passed: true })
				} catch (err) {
					div.className = 'test fail'
					div.innerHTML =
						`❌  ${name}` +
						`<div class="detail">${err.message}</div>`
					results.push({ name, passed: false, error: err.message })
				}
			}

			// ── Load GTFS and build test context ───────────────────────────────────

			// GTFS data is served relative to the project root, one level up.
			const { rawConnections, stopsById, stopsByNorm, servicesByDate } =
				await loadGTFS('../data')

			const dateStr = findTestDate(servicesByDate)
			const connections = materializeConnections(
				rawConnections,
				servicesByDate,
				dateStr,
			)
			const t0 = Math.floor(
				new Date(
					+dateStr.slice(0, 4),
					+dateStr.slice(4, 6) - 1,
					+dateStr.slice(6, 8),
					8,
					0,
					0,
				).getTime() / 1000,
			)

			// ── Run all tests ──────────────────────────────────────────────────────

			await runTests(test, assert, {
				connections,
				stopsById,
				stopsByNorm,
				dateStr,
				t0,
			})

			// ── Summary ────────────────────────────────────────────────────────────

			const passed = results.filter((r) => r.passed).length
			const failed = results.filter((r) => !r.passed).length
			summaryEl.textContent = `${passed} passed, ${failed} failed`
			summaryEl.className = failed === 0 ? 'all-pass' : 'has-fail'
		</script>
	</body>
</html>
