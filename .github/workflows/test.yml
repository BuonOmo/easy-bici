name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Also re-run after each timetable update so a broken feed is caught quickly.
  workflow_run:
    workflows: [Update GTFS timetable]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }}@${{ github.ref }}'
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: Run tests
        # Use French local time so that date-based midnight calculations in
        # materializeConnections() match what a browser in France would produce.
        env:
          TZ: Europe/Paris
        run: node test/run.js
